name: Deploy to Firebase

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install react react-dom socket.io-client
          npm install --save-dev vite @vitejs/plugin-react typescript @types/react @types/react-dom

      - name: Build
        run: npx vite build

      - name: Show built index.html
        run: cat dist/index.html

      - name: Check dist assets
        run: ls -la dist/assets/

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project studybuddy-ae87e --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
